name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  testit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip
      - run: pip install -r requirements.txt
      # LLM-testit (marker: llm) vaatisivat API-avaimen ja maksaisivat;
      # CI ajaa vain verkosta hakevat heuristiikka- ja yksikkötestit.
      - run: python -m pytest -m "not llm" -v
